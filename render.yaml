services:
  - type: web
    name: weaver
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: Weaver
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: export PATH="$HOME/.cargo/bin:$PATH" && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://kolam-lmxe6dwtc-sadhasivamgmailcoms-projects.vercel.app
      - key: ENVIRONMENT
        value: production
    disk:
      name: uploads
      mountPath: /opt/render/project/src/Weaver/app/storage/uploads
      sizeGB: 1
