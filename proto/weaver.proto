syntax = "proto3";

package texture;

import "common.proto";

option go_package = "github.com/sadhasivam/texture/pb";

// Weaver service - ML computation engine
service WeaverService {
  // Execute an algorithm run
  rpc ExecuteRun(ExecuteRunRequest) returns (ExecuteRunResponse);

  // Validate if a run can be executed
  rpc ValidateRun(ValidateRunRequest) returns (ValidateRunResponse);

  // Infer schema from CSV data
  rpc InferSchema(InferSchemaRequest) returns (InferSchemaResponse);

  // Health check
  rpc HealthCheck(Empty) returns (HealthResponse);
}

// Empty message
message Empty {}

// Health check response
message HealthResponse {
  string status = 1;
  string python_version = 2;
  repeated string available_algorithms = 3;
}

// Execute run request
message ExecuteRunRequest {
  string algorithm_id = 1;
  bytes dataset_csv = 2; // Raw CSV data as bytes
  string target_column = 3;
  repeated string feature_columns = 4;
  map<string, string> parameters = 5;
  string request_id = 6; // For tracing/logging
}

// Execute run response
message ExecuteRunResponse {
  string status = 1; // success, error
  RunSummary summary = 2;
  map<string, double> metrics = 3;
  repeated Chart charts = 4;
  repeated Table tables = 5;
  repeated string explanations = 6;
  repeated string warnings = 7;
  string error_message = 8;
}

// Run summary metadata
message RunSummary {
  string target_column = 1;
  repeated string feature_columns = 2;
  int32 train_rows = 3;
  int32 test_rows = 4;
  map<string, string> parameters = 5;
}

// Validate run request
message ValidateRunRequest {
  string algorithm_id = 1;
  repeated string column_names = 2;
  repeated string column_types = 3;
  string target_column = 4;
  repeated string feature_columns = 5;
  map<string, string> parameters = 6;
}

// Validate run response
message ValidateRunResponse {
  bool is_valid = 1;
  repeated string errors = 2;
}

// Infer schema request
message InferSchemaRequest {
  bytes dataset_csv = 1; // Raw CSV data as bytes
  string dataset_id = 2; // Optional ID for tracking
}

// Infer schema response
message InferSchemaResponse {
  string dataset_id = 1;
  string filename = 2;
  int32 row_count = 3;
  int32 column_count = 4;
  repeated ColumnSchema columns = 5;
  repeated PreviewRow preview_rows = 6;
}

// Column schema metadata
message ColumnSchema {
  string name = 1;
  string inferred_type = 2; // numeric, categorical, boolean, datetime, text, identifier
  int32 missing_count = 3;
  int32 unique_count = 4;
  repeated string sample_values = 5;
}

// Preview row (for dataset preview)
message PreviewRow {
  map<string, string> cells = 1;
}
