apiVersion: texture.ml/v1
kind: Algorithm
metadata:
  name: gradient-boosting
  displayName: Gradient Boosting
  namespace: supervised-learning
  labels:
    difficulty: advanced
    model-family: tree
    category: both
  annotations:
    texture.ml/version: 1.0.0
spec:
  ontologyRef: base/ontology-supervised-both.yaml
  dependencyRef: base/dependencies-sklearn-base.yaml
  id: gradient_boosting
  description: Ensemble method that builds trees sequentially, each correcting errors
    of the previous.
  tags:
  - ensemble
  - boosting
  - powerful
  - feature-importance
  - gradient-descent
  difficulty: advanced
  modelFamily: tree
  target:
    required: true
    types:
    - numeric
    - categorical
    - boolean
    cardinality: single
    nullable: false
  features:
    required: true
    types:
    - numeric
    min: 1
    max: null
  parameters:
  - name: test_size
    type: float
    default: 0.2
    label: Test size
  - name: n_estimators
    type: int
    default: 100
    label: Number of boosting stages
  - name: learning_rate
    type: float
    default: 0.1
    label: Learning rate
  - name: max_depth
    type: int
    default: 3
    label: Maximum depth of trees
  outputs:
    metrics:
    - name: varies by task type
    visualizations:
    - name: feature_importance
      defaultChart: bar
      title: Feature Importance
    tables:
    - name: performance_summary
      title: Performance Summary
  validationRules:
  - Target can be numeric, categorical, or boolean
  - At least one feature column is required
  - All features must be numeric
  handler:
    module: app.ml.supervised.gradient_boosting
    class: GradientBoostingAdapter
    interface: AlgorithmAdapter
