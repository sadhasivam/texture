apiVersion: texture.ml/v1
kind: Algorithm
metadata:
  name: linear-regression
  displayName: Linear Regression
  namespace: supervised-learning
  labels:
    difficulty: beginner
    model-family: linear
    category: regression
  annotations:
    texture.ml/version: 1.0.0
spec:
  ontologyRef: base/ontology-supervised-regression.yaml
  dependencyRef: base/dependencies-sklearn-base.yaml
  id: linear_regression
  description: Predicts a continuous numeric target from one or more features.
  tags:
  - interpretable
  - beginner-friendly
  - parametric
  - fast
  - linear
  difficulty: beginner
  modelFamily: linear
  target:
    required: true
    types:
    - numeric
    cardinality: single
    nullable: false
  features:
    required: true
    types:
    - numeric
    min: 1
    max: null
  parameters:
  - name: test_size
    type: float
    default: 0.2
    label: Test size
  outputs:
    metrics:
    - name: r2
      displayName: R² Score
      description: Proportion of variance explained by the model
      range: [-inf, 1.0]
      higherIsBetter: true
    - name: mae
      displayName: Mean Absolute Error
      description: Average absolute difference between predictions and actual
      range: [0, inf]
      higherIsBetter: false
    - name: rmse
      displayName: Root Mean Squared Error
      description: Square root of average squared errors
      range: [0, inf]
      higherIsBetter: false

    visualizations:
    - name: predicted_vs_actual
      defaultChart: scatter
      title: Predicted vs Actual
      description: Compare model predictions to actual values
      dataFields:
        x: actual
        y: predicted
        trend: best_fit
      availableCharts: [scatter, line]

    - name: residual_plot
      defaultChart: scatter
      title: Residual Plot
      description: Distribution of prediction errors
      dataFields:
        x: predicted
        y: residual
      availableCharts: [scatter, histogram]

    tables:
    - name: coefficients
      title: Feature Coefficients
      description: Linear coefficients for each feature
      columns:
      - name: feature
        type: string
      - name: coefficient
        type: float
  validationRules:
  - Target must be numeric
  - At least one feature column is required
  - All features must be numeric
  handler:
    module: app.ml.linear_regression_spec
    class: LinearRegressionSpecAdapter
    interface: AlgorithmAdapter
