apiVersion: texture.ml/v1
kind: Algorithm
metadata:
  name: random-forest
  displayName: Random Forest
  namespace: supervised-learning
  labels:
    difficulty: intermediate
    model-family: tree
    category: both
  annotations:
    texture.ml/version: 1.0.0
spec:
  ontologyRef: base/ontology-supervised-both.yaml
  dependencyRef: base/dependencies-sklearn-base.yaml
  id: random_forest
  description: Builds an ensemble of decision trees for robust predictions.
  tags:
  - ensemble
  - bagging
  - robust
  - feature-importance
  - handles-missing
  difficulty: intermediate
  modelFamily: tree
  target:
    required: true
    types:
    - numeric
    - categorical
    - boolean
    cardinality: single
    nullable: false
  features:
    required: true
    types:
    - numeric
    min: 1
    max: null
  parameters:
  - name: test_size
    type: float
    default: 0.2
    label: Test size
  - name: n_estimators
    type: int
    default: 100
    label: Number of trees
  outputs:
    metrics:
    - name: varies by task type
    visualizations:
    - name: feature_importance
      defaultChart: bar
      title: Feature Importance
    tables:
    - name: performance_summary
      title: Performance Summary
  validationRules:
  - Target can be numeric, categorical, or boolean
  - At least one feature column is required
  - All features must be numeric
  handler:
    module: app.ml.supervised.random_forest
    class: RandomForestAdapter
    interface: AlgorithmAdapter
