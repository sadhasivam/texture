apiVersion: texture.ml/v1
kind: Algorithm
metadata:
  name: kmeans
  displayName: K-Means Clustering
  namespace: unsupervised-learning
  labels:
    difficulty: beginner
    model-family: clustering
    category: clustering
  annotations:
    texture.ml/version: 1.0.0
spec:
  ontologyRef: base/ontology-unsupervised-clustering.yaml
  dependencyRef: base/dependencies-sklearn-base.yaml
  id: kmeans
  description: Partitions data into K distinct clusters based on feature similarity.
  tags:
  - unsupervised
  - fast
  - simple
  - centroid-based
  - beginner-friendly
  difficulty: beginner
  modelFamily: clustering
  target:
    required: false
    types: []
    cardinality: single
    nullable: false
  features:
    required: true
    types:
    - numeric
    min: 2
    max: null
  parameters:
  - name: n_clusters
    type: int
    default: 3
    label: Number of clusters (K)
  - name: max_iter
    type: int
    default: 300
    label: Maximum iterations
  - name: random_state
    type: int
    default: 42
    label: Random seed
  outputs:
    metrics:
    - name: inertia
      displayName: Inertia
      description: Within-cluster sum of squares
      range: [0, inf]
      higherIsBetter: false
    - name: silhouette_score
      displayName: Silhouette Score
      description: How well-separated the clusters are
      range: [-1, 1]
      higherIsBetter: true

    visualizations:
    - name: cluster_scatter
      defaultChart: scatter
      title: Cluster Visualization
      description: Data points colored by assigned cluster with centroids
      dataFields:
        x: feature_0
        y: feature_1
        cluster: cluster_id
        centers: cluster_centers
      availableCharts: [scatter, 3d-scatter]

    tables:
    - name: cluster_summary
      title: Cluster Summary
      description: Size and percentage of each cluster
      columns:
      - name: cluster
        type: int
      - name: size
        type: int
      - name: percentage
        type: float
  validationRules:
  - At least 2 feature columns required
  - All features must be numeric
  - Number of clusters must be less than number of samples
  handler:
    module: app.ml.kmeans_spec
    class: KMeansSpecAdapter
    interface: AlgorithmAdapter
